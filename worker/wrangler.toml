name = "e-library-api"
main = "src/index.js"
compatibility_date = "2024-11-01"

# Set your GitHub Pages origin (comma-separated for multiple origins not supported — use * only for dev)
[vars]
CORS_ORIGIN = "http://127.0.0.1:3000"

[[r2_buckets]]
binding = "BOOKS_BUCKET"
bucket_name = "e-library-files"

# Secrets (wrangler secret put):
# TIDB_HOST, TIDB_USER, TIDB_PASSWORD, TIDB_DATABASE, API_KEY
