<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>E-Library</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📖</text></svg>">
    <link rel="stylesheet" href="css/styles.css" />

  </head>
  <body>
    <header class="site-header">
      <div class="container">
        <h1>E-Library</h1>
        <p class="tagline">Discover, read, and organize your books seamlessly</p>
      </div>
    </header>

    <main class="container">
      <section class="toolbar" aria-label="Search and admin">
        <div class="search-wrap">
          <label for="search" class="visually-hidden">Search books</label>
          <input
            type="search"
            id="search"
            placeholder="Search by title, author, or year…"
            autocomplete="off"
          />
        </div>
        <div class="admin-wrap">
          <label for="api-key" class="admin-label">Admin API key</label>
          <input
            type="password"
            id="api-key"
            placeholder="Required for add, edit, and delete"
            autocomplete="off"
            aria-describedby="api-key-error"
          />
          <p id="api-key-error" class="input-error" role="alert" aria-live="polite"></p>
        </div>
      </section>

      <section class="add-book" aria-labelledby="add-heading">
        <h2 id="add-heading">Add a book</h2>
        <form id="add-form" class="add-form">
          <div class="form-row">
            <label for="title">Title</label>
            <input type="text" id="title" name="title" required maxlength="255" />
          </div>
          <div class="form-row">
            <label for="author">Author</label>
            <input type="text" id="author" name="author" required maxlength="255" />
          </div>
          <div class="form-row">
            <label for="year">Year</label>
            <input
              type="number"
              id="year"
              name="year"
              min="1000"
              max="2100"
              placeholder="e.g. 2020"
            />
          </div>
          <div class="form-row">
            <label for="cover">Cover image (optional)</label>
            <input
              type="file"
              id="cover"
              name="cover"
              accept="image/jpeg,image/png,image/webp,image/gif"
              aria-describedby="cover-help"
            />
            <p id="cover-help" class="input-help">JPEG, PNG, WebP, or GIF.</p>
          </div>
          <div class="form-row">
            <label for="pdf">PDF file (optional)</label>
            <input
              type="file"
              id="pdf"
              name="pdf"
              accept="application/pdf"
              aria-describedby="pdf-help"
            />
            <p id="pdf-help" class="input-help">Upload a PDF to enable the in-browser reader.</p>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn btn-primary">Add book</button>
            <button type="reset" class="btn btn-secondary">Clear</button>
          </div>
        </form>
      </section>

      <section class="catalog" aria-labelledby="catalog-heading">
        <div class="catalog-header">
          <h2 id="catalog-heading">Catalog</h2>
          <p id="book-count" class="book-count" aria-live="polite"></p>
        </div>
        <p id="status-message" class="status-message" role="status" aria-live="polite"></p>
        <button id="retry-load" class="btn btn-secondary retry-btn" type="button" hidden>Retry</button>
        <div id="book-list" class="book-list" role="list"></div>
        <div id="pager" class="pager" aria-label="Pagination">
          <button id="prev-page" class="btn btn-secondary" type="button">Previous</button>
          <span id="page-label" class="page-label">Page 1</span>
          <button id="next-page" class="btn btn-secondary" type="button">Next</button>
        </div>
      </section>
    </main>

    <dialog id="edit-modal" class="edit-modal" aria-labelledby="edit-heading">
      <form id="edit-form" class="edit-form" method="dialog">
        <h2 id="edit-heading">Edit book</h2>
        <input type="hidden" id="edit-id" name="id" />
        <div class="form-row">
          <label for="edit-title">Title</label>
          <input type="text" id="edit-title" name="title" required maxlength="255" />
        </div>
        <div class="form-row">
          <label for="edit-author">Author</label>
          <input type="text" id="edit-author" name="author" required maxlength="255" />
        </div>
        <div class="form-row">
          <label for="edit-year">Year</label>
          <input
            type="number"
            id="edit-year"
            name="year"
            min="1000"
            max="2100"
            placeholder="e.g. 2020"
          />
        </div>
        <div class="form-row">
          <label for="edit-cover">Replace cover image (optional)</label>
          <input
            type="file"
            id="edit-cover"
            name="cover"
            accept="image/jpeg,image/png,image/webp,image/gif"
            aria-describedby="edit-cover-help"
          />
          <p id="edit-cover-help" class="input-help">Leave empty to keep existing cover.</p>
        </div>
        <div class="form-row">
          <label for="edit-pdf">Replace PDF file (optional)</label>
          <input
            type="file"
            id="edit-pdf"
            name="pdf"
            accept="application/pdf"
            aria-describedby="edit-pdf-help"
          />
          <p id="edit-pdf-help" class="input-help">Leave empty to keep existing file.</p>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary">Save changes</button>
          <button type="button" id="edit-cancel" class="btn btn-secondary">Cancel</button>
        </div>
      </form>
    </dialog>

    <footer class="site-footer">
      <div class="container">
        <p>&copy; <span id="footer-year"></span> E-Library. Developed by Mani Kumar Sadhu.</p>
      </div>
    </footer>



    <script type="module" src="js/app.js"></script>
  </body>
</html>
