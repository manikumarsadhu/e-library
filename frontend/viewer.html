<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document Viewer</title>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📖</text></svg>">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf_viewer.min.css"
    integrity="sha384-b5aas4/vWrXQ1svVWYn4HqfslIB45T2lbBLblxxlZvBxqHz+iSOFAttcx7vJd4HI" crossorigin="anonymous" />
  <style>
    :root {
      --bg-color: #0f172a;
      --surface-color: #1e293b;
      --border-color: #334155;
      --text-color: #f8fafc;
      --text-muted: #94a3b8;
      --primary-color: #3b82f6;
      --primary-hover: #2563eb;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: system-ui, -apple-system, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
      transition: background-color 0.2s, color 0.2s;
    }

    /* Theme styles */
    body.theme-dark {
      --bg-color: #0f172a;
      --surface-color: #1e293b;
      --border-color: #334155;
      --text-color: #f8fafc;
      --text-muted: #94a3b8;
    }

    body.theme-dark #viewer-container {
      background-color: #0b0f19;
    }

    body.theme-sepia {
      --bg-color: #f4ecd8;
      --surface-color: #e4d7ba;
      --border-color: #d0c09e;
      --text-color: #5c4033;
      --text-muted: #8c7060;
    }

    body.theme-sepia #viewer-container {
      background-color: #fbf0d9;
    }

    body.theme-sepia canvas {
      filter: sepia(0.65) contrast(0.9) brightness(0.95);
    }

    body.theme-light {
      --bg-color: #f1f5f9;
      --surface-color: #ffffff;
      --border-color: #cbd5e1;
      --text-color: #0f172a;
      --text-muted: #64748b;
    }

    body.theme-light #viewer-container {
      background-color: #e2e8f0;
    }

    body.theme-light canvas {
      filter: none;
    }

    header {
      background-color: var(--surface-color);
      border-bottom: 1px solid var(--border-color);
      padding: calc(0.625rem + env(safe-area-inset-top, 0px)) calc(1rem + env(safe-area-inset-right, 0px)) 0.625rem calc(1rem + env(safe-area-inset-left, 0px));
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      flex-wrap: wrap;
      z-index: 10;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      transition: background-color 0.2s, border-color 0.2s;
    }

    .doc-info {
      display: flex;
      flex-direction: column;
      gap: 0.125rem;
      min-width: 0;
      flex: 1 1 120px;
    }

    .doc-title {
      font-weight: 600;
      font-size: 0.9375rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .doc-pages {
      font-size: 0.7rem;
      color: var(--text-muted);
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-shrink: 0;
    }

    .btn {
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-color);
      border-radius: 6px;
      padding: 0.5rem;
      min-width: 44px;
      min-height: 44px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.875rem;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }

    .btn:hover {
      background: var(--border-color);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    select.btn {
      padding: 0.4rem 0.75rem;
      font-weight: 500;
      outline: none;
    }

    select.btn option {
      background-color: var(--surface-color);
      color: var(--text-color);
    }

    .zoom-level {
      font-size: 0.875rem;
      font-weight: 500;
      min-width: 45px;
      text-align: center;
    }

    #viewer-container {
      flex: 1;
      overflow: auto;
      padding: 1.5rem calc(1.5rem + env(safe-area-inset-right, 0px)) calc(1.5rem + env(safe-area-inset-bottom, 0px)) calc(1.5rem + env(safe-area-inset-left, 0px));
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 1.5rem;
      transition: background-color 0.2s;
      box-sizing: border-box;
    }

    @media (max-width: 480px) {
      header {
        padding: calc(0.5rem + env(safe-area-inset-top, 0px)) calc(0.5rem + env(safe-area-inset-right, 0px)) 0.5rem calc(0.5rem + env(safe-area-inset-left, 0px));
      }

      .controls {
        width: 100%;
        justify-content: space-between;
        gap: 0.375rem;
      }

      .doc-info {
        flex: 1 1 100%;
      }

      .zoom-level {
        min-width: 36px;
        font-size: 0.75rem;
      }

      select.btn {
        padding: 0.35rem 0.55rem;
      }

      #viewer-container {
        padding: 0.75rem calc(0.75rem + env(safe-area-inset-right, 0px)) calc(0.75rem + env(safe-area-inset-bottom, 0px)) calc(0.75rem + env(safe-area-inset-left, 0px));
        gap: 0.75rem;
      }
    }

    @media (max-width: 640px) {
      header {
        row-gap: 0.5rem;
      }

      .controls {
        flex-wrap: wrap;
      }
    }

    .page-container {
      position: relative;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4), 0 4px 6px -2px rgba(0, 0, 0, 0.4);
      background: white;
      border-radius: 4px;
      overflow: hidden;
      margin-inline: auto;
      flex-shrink: 0;
    }

    canvas {
      display: block;
    }

    .textLayer {
      mix-blend-mode: multiply;
      user-select: text !important;
    }

    /* Resume prompt toast style */
    #resume-toast {
      position: fixed;
      bottom: calc(1rem + env(safe-area-inset-bottom, 0px));
      right: 1rem;
      left: 1rem;
      max-width: 380px;
      margin-inline: auto;
      background-color: var(--surface-color);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 0.875rem;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
      display: flex;
      align-items: center;
      gap: 0.75rem;
      z-index: 100;
      animation: slideIn 0.3s ease-out;
    }

    #resume-toast.hidden {
      display: none !important;
    }

    .toast-msg {
      font-size: 0.875rem;
      font-weight: 500;
    }

    @keyframes slideIn {
      from {
        transform: translateY(100px);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    /* Loading State */
    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 1.25rem;
      font-weight: 500;
      color: var(--text-muted);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid var(--border-color);
      border-top: 4px solid var(--primary-color);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      border: 0;
    }

    #pinch-hint {
      position: fixed;
      left: 50%;
      bottom: calc(4rem + env(safe-area-inset-bottom, 0px));
      transform: translateX(-50%);
      background: rgba(15, 23, 42, 0.9);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 999px;
      padding: 0.45rem 0.85rem;
      font-size: 0.8rem;
      font-weight: 500;
      z-index: 110;
      backdrop-filter: blur(2px);
    }

    #pinch-hint.hidden {
      display: none;
    }

    /* AI Sidebar and Layout Styles */
    #main-layout {
      display: flex;
      flex: 1;
      overflow: hidden;
      position: relative;
      width: 100%;
    }

    #ai-sidebar {
      width: 360px;
      background-color: var(--surface-color);
      border-left: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      transition: transform 0.3s ease, margin-right 0.3s ease, width 0.3s ease;
      z-index: 50;
      box-shadow: -4px 0 15px -3px rgba(0, 0, 0, 0.3);
    }

    #ai-sidebar.collapsed {
      margin-right: -360px;
      transform: translateX(360px);
      pointer-events: none;
      width: 0;
      border-left: none;
    }

    .sidebar-header {
      padding: 1rem;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .sidebar-header h3 {
      margin: 0;
      font-size: 1rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .close-btn {
      background: transparent;
      border: none;
      color: var(--text-color);
      font-size: 1.5rem;
      cursor: pointer;
      padding: 0.25rem;
      line-height: 1;
    }

    .sidebar-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: 1rem;
      gap: 1rem;
    }

    .chat-history {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      overflow-y: auto;
    }

    .chat-message {
      padding: 0.75rem;
      border-radius: 8px;
      font-size: 0.875rem;
      line-height: 1.4;
      max-width: 85%;
      word-break: break-word;
    }

    .chat-message.system {
      background-color: var(--border-color);
      color: var(--text-muted);
      align-self: center;
      max-width: 95%;
      text-align: center;
      font-style: italic;
    }

    .chat-message.user {
      background-color: var(--primary-color);
      color: white;
      align-self: flex-end;
    }

    .chat-message.ai {
      background-color: var(--border-color);
      color: var(--text-color);
      align-self: flex-start;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .chat-message.ai.error {
      border-color: #ef4444;
      background-color: rgba(239, 68, 68, 0.1);
      color: #fca5a5;
    }

    .suggested-prompts {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: auto;
      padding-top: 0.5rem;
      border-top: 1px dashed var(--border-color);
    }

    .prompt-chip {
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-muted);
      border-radius: 999px;
      padding: 0.35rem 0.75rem;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .prompt-chip:hover {
      border-color: var(--primary-color);
      color: var(--text-color);
      background-color: rgba(59, 130, 246, 0.1);
    }

    .sidebar-input-area {
      padding: 1rem;
      border-top: 1px solid var(--border-color);
      display: flex;
      gap: 0.5rem;
      align-items: flex-end;
      background-color: var(--surface-color);
    }

    #ai-chat-input {
      flex: 1;
      background-color: var(--bg-color);
      border: 1px solid var(--border-color);
      color: var(--text-color);
      border-radius: 6px;
      padding: 0.5rem 0.75rem;
      font-size: 0.875rem;
      resize: none;
      height: 38px;
      box-sizing: border-box;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s ease;
    }

    #ai-chat-input:focus {
      border-color: var(--primary-color);
    }

    #ai-send-btn {
      background-color: var(--primary-color);
      color: white;
      border: 1px solid var(--primary-color);
      border-radius: 6px;
      cursor: pointer;
      padding: 0.5rem;
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color 0.15s ease;
    }

    #ai-send-btn:hover {
      background-color: var(--primary-hover);
    }

    #ai-send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .chat-message.ai p {
      margin: 0 0 0.5rem 0;
    }

    .chat-message.ai p:last-child {
      margin-bottom: 0;
    }

    .chat-message.ai ul,
    .chat-message.ai ol {
      margin: 0 0 0.5rem 0;
      padding-left: 1.25rem;
    }

    .chat-message.ai code {
      background-color: rgba(0, 0, 0, 0.2);
      padding: 0.1rem 0.3rem;
      border-radius: 3px;
      font-family: monospace;
      font-size: 0.8rem;
    }

    @media (max-width: 768px) {
      #ai-sidebar {
        position: absolute;
        right: 0;
        top: 0;
        bottom: 0;
        width: 100%;
        max-width: 320px;
      }

      #ai-sidebar.collapsed {
        margin-right: -320px;
        transform: translateX(320px);
        width: 0;
      }
    }

    @media (max-width: 576px) {
      #ai-sidebar {
        position: absolute;
        bottom: 0;
        top: auto;
        left: 0;
        right: 0;
        width: 100%;
        max-width: 100%;
        height: 50vh;
        border-left: none;
        border-top: 1px solid var(--border-color);
        border-radius: 16px 16px 0 0;
        box-shadow: 0 -10px 15px -3px rgba(0, 0, 0, 0.3);
        margin-right: 0;
        transform: none;
        transition: transform 0.3s ease, height 0.3s ease, margin-bottom 0.3s ease;
      }

      #ai-sidebar.collapsed {
        margin-right: 0;
        margin-bottom: -50vh;
        transform: translateY(50vh);
        height: 0;
        width: 100%;
      }
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"
    integrity="sha384-lrb5efVIYR2lZw+OsuztHZzP9wpGNrhui+0VlpiHb/iPcZSCDT3CeETsL9EMQ8ih"
    crossorigin="anonymous"></script>
</head>

<body class="theme-dark">
  <header>
    <div class="doc-info">
      <div class="doc-title" id="doc-title">Loading...</div>
      <div class="doc-pages" id="doc-pages">Page: - / -</div>
    </div>
    <div class="controls">
      <button id="zoom-out" class="btn" title="Zoom Out" aria-label="Zoom out">
        <span class="visually-hidden">Zoom out</span>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
      </button>
      <span class="zoom-level" id="zoom-value">125%</span>
      <button id="zoom-in" class="btn" title="Zoom In" aria-label="Zoom in">
        <span class="visually-hidden">Zoom in</span>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
      </button>
      <button id="zoom-fit" class="btn" title="Fit Width" aria-label="Fit to width">
        <span class="visually-hidden">Fit to width</span>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 12h16M4 12l3-3M4 12l3 3" />
          <path d="M20 12l-3-3M20 12l-3 3" />
        </svg>
      </button>
      <select id="theme-select" class="btn" title="Change Theme" aria-label="Change theme">
        <option value="dark">🌙</option>
        <option value="light">☀️</option>
        <option value="sepia">📖</option>
      </select>
      <button id="ai-toggle" class="btn" title="Toggle AI Assistant" aria-label="Toggle AI Assistant">
        <span class="visually-hidden">Toggle AI Assistant</span>
        <span style="font-size: 1.1rem; line-height: 1;">✨</span>
      </button>
      <button id="fullscreen-toggle" class="btn" title="Toggle Fullscreen" aria-label="Toggle fullscreen">

        <span class="visually-hidden">Toggle fullscreen</span>
        <svg id="fullscreen-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2.5">
          <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3">
          </path>
        </svg>
      </button>
    </div>
  </header>

  <div id="main-layout">
    <div id="viewer-container">
      <div id="loading">
        <div class="spinner"></div>
        <div>Loading Document...</div>
      </div>
    </div>

    <!-- AI Sidebar -->
    <div id="ai-sidebar" class="collapsed">
      <div class="sidebar-header">
        <h3><span>✨</span> AI Assistant</h3>
        <button id="ai-close" class="close-btn" aria-label="Close AI Sidebar">&times;</button>
      </div>
      <div class="sidebar-content">
        <div id="ai-chat-history" class="chat-history">
          <div class="chat-message system">
            Hello! I'm your AI Reading Assistant. Ask me questions about the book, or use the shortcuts below.
          </div>
        </div>
        <div class="suggested-prompts">
          <button class="prompt-chip" data-prompt="Summarize the current page in 3 bullet points">Summarize
            Page</button>
          <button class="prompt-chip" data-prompt="Explain the core concepts or ideas on this page">Explain
            Concepts</button>
          <button class="prompt-chip" data-prompt="What are the key takeaways or action items on this page?">Key
            Takeaways</button>
        </div>
      </div>
      <div class="sidebar-input-area">
        <textarea id="ai-chat-input" placeholder="Ask a question about this page..." rows="1"></textarea>
        <button id="ai-send-btn" class="btn" title="Send question" aria-label="Send to AI">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </div>
  </div>


  <!-- Resume reading toast notification -->
  <div id="resume-toast" class="hidden">
    <div class="toast-msg" id="resume-msg">Resume reading on page 1?</div>
    <button id="resume-yes" class="btn btn-primary"
      style="background-color: var(--primary-color); border:none; padding: 0.4rem 0.8rem;">Yes</button>
    <button id="resume-no" class="btn" style="padding: 0.4rem 0.8rem;">Dismiss</button>
  </div>

  <div id="pinch-hint" class="hidden" role="status" aria-live="polite">Pinch with two fingers to zoom</div>

  <script src="js/viewer.js"></script>
</body>

</html>
